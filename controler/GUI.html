<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rotary Stage Controller</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
  font-family:Helvetica,Arial,sans-serif;
  background:#f5f7fb;
  margin:0;
  padding:30px;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  color:#0f172a;
}

.card{
  background:white;
  width:900px;
  max-width:95%;
  padding:30px;
  border-radius:18px;
  box-shadow:0 12px 30px rgba(15,23,42,0.12);

  display:grid;
  grid-template-columns:420px 1fr;
  row-gap:14px;
  column-gap:30px;
}

h1{
  grid-column:1 / -1;
  margin:0;
  font-size:34px;
}

.sub{
  grid-column:1 / -1;
  color:#64748b;
  font-size:16px;
}

.statusBar{
  grid-column:1 / -1;
  display:flex;
  gap:10px;
}

.badge{
  padding:8px 14px;
  border-radius:999px;
  font-size:14px;
  font-weight:700;
  background:#e2e8f0;
}

.badge.connected{
  background:#dcfce7;
  color:#166534;
}

.badge.moving{
  background:#dbeafe;
  color:#1d4ed8;
}

/* LEFT COLUMN */

.angleWrap{
  grid-column:1;
  text-align:center;
}

.angleDisplay{
  font-size:36px;
  font-weight:700;
}

.angleLabel{
  font-size:16px;
  color:#64748b;
}

.dial{
  width:260px;
  height:260px;
  border-radius:50%;
  position:relative;
  margin:18px auto;
  background:
  radial-gradient(circle at center,#fff 0 44%,#e2e8f0 44.5% 45.5%,#fff 46% 100%);
  border:10px solid #cbd5e1;
}

/* corrected dial geometry */

.tick{
  position:absolute;
  left:50%;
  top:6px;
  width:3px;
  height:16px;
  background:#94a3b8;
  transform-origin:50% 130px;
}

.tick.major{
  height:24px;
  width:4px;
  background:#475569;
}

.tickLabel{
  position:absolute;
  left:50%;
  top:12px;
  transform-origin:50% 120px;
  font-size:14px;
  font-weight:700;
}

.pointer{
  position:absolute;
  left:50%;
  top:50%;
  width:6px;
  height:110px;
  background:#2563eb;
  border-radius:8px;

  transform:translate(-50%,-100%) rotate(0deg);
  transform-origin:50% 100%;
}

.pointerTip{
position:absolute;
top:-12px;
left:50%;
width:0;
height:0;

border-left:10px solid transparent;
border-right:10px solid transparent;
border-bottom:16px solid #2563eb;

transform:translateX(-50%);
}

.centerDot{
  position:absolute;
  left:50%;
  top:50%;
  width:18px;
  height:18px;
  background:#0f172a;
  border-radius:50%;
  transform:translate(-50%,-50%);
}

.targetMarker{
  position:absolute;
  left:50%;
  top:16px;
  width:4px;
  height:26px;
  background:#dc2626;
  transform-origin:50% 120px;
  opacity:0;
}

.targetMarker.show{
  opacity:1;
}

/* RIGHT PANEL */

.controlPanel{
  grid-column:2;
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* TABLE */

.infoTable{
  width:100%;
  border-collapse:collapse;
  font-size:15px;
}

.infoTable td{
  border:1px solid #e2e8f0;
  padding:8px 10px;
}

.infoTable td:first-child{
  background:#f8fafc;
  font-weight:600;
}

.infoValue{
  text-align:right;
  font-weight:700;
}

.infoTable input{
  width:90px;
  font-size:15px;
  padding:4px;
  text-align:right;
}

/* BUTTONS */

.buttonGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

button{
  font-size:18px;
  padding:10px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  color:white;
}

.connect{background:#16a34a;}
.cw{background:#2563eb;}
.ccw{background:#7c3aed;}
.stop{background:#dc2626;}

.full{
  grid-column:1 / -1;
}

.note{
  grid-column:1 / -1;
  font-size:14px;
  color:#64748b;
}

/* MOBILE */

@media (max-width:900px){

.card{
grid-template-columns:1fr;
}

.dial{
width:220px;
height:220px;
}

}

</style>


<div class="card">

<h1>Revolve Stage</h1>

<div class="sub">
Live angle display with serial control for clockwise and anticlockwise motion
</div>

<div class="statusBar">
<div id="connectBadge" class="badge">Not Connected</div>
<div id="moveBadge" class="badge">Stopped</div>
</div>


<div class="angleWrap">

<div class="angleLabel">Current Angle</div>
<div id="angleDisplay" class="angleDisplay">0.00°</div>

<div id="dial" class="dial">
<div id="targetMarker" class="targetMarker"></div>

<div id="pointer" class="pointer">
<div class="pointerTip"></div>
</div>

<div class="centerDot"></div>
</div>

</div>


<div class="controlPanel">

<table class="infoTable">

<tr>
<td>Current Angle</td>
<td class="infoValue" id="tableCurrentAngle">0.00°</td>
</tr>

<tr>
<td>Set Angle</td>
<td class="infoValue">
<input id="target" type="number" step="0.01" min="0" max="360" value="90">
</td>
</tr>

<tr>
<td>Frequency</td>
<td class="infoValue">
<input id="freq" type="number" step="0.1" value="10">
</td>
</tr>

<tr>
<td>Status</td>
<td class="infoValue" id="directionReadout">Stopped</td>
</tr>

</table>


<div class="buttonGrid">

<button class="connect full" onclick="connectSerial()">Connect</button>

<button class="cw" onclick="runClockwise()">Clockwise</button>
<button class="ccw" onclick="runAnticlockwise()">Anticlockwise</button>

<button class="stop full" onclick="stopMotor()">Stop</button>

</div>

</div>


<div class="note">
Drag the dial to set a target angle. You can also type the target angle and frequency directly in the table.
</div>

</div>
<script>
let port;
let reader;
let writer;
let serialBuffer = "";

let currentAngle = 0;
let targetAngle = null;
let movingDirection = null;
const tableCurrentAngle = document.getElementById("tableCurrentAngle");
const tableFrequency = document.getElementById("tableFrequency");
const angleDisplay = document.getElementById("angleDisplay");
const pointer = document.getElementById("pointer");
const targetMarker = document.getElementById("targetMarker");
const targetReadout = document.getElementById("targetReadout");
const directionReadout = document.getElementById("directionReadout");
const connectBadge = document.getElementById("connectBadge");
const moveBadge = document.getElementById("moveBadge");
const dial = document.getElementById("dial");
const targetInput = document.getElementById("target");
const freqInput = document.getElementById("freq");

function normaliseAngle(angle){
  let a = angle % 360;
  if(a < 0) a += 360;
  return a;
}

function updateAngleDisplay(angle){
  currentAngle = normaliseAngle(angle);
  angleDisplay.innerText = currentAngle.toFixed(2) + "°";
pointer.style.transform = "translateX(-50%) rotate(" + (currentAngle + 180) + "deg)";}
function updateTargetDisplay(){
  const raw = parseFloat(targetInput.value);
  if(isNaN(raw)){
    targetAngle = null;
    targetReadout.innerText = "--";
    targetMarker.classList.remove("show");
    return;
  }

  targetAngle = normaliseAngle(raw);
  targetReadout.innerText = targetAngle.toFixed(2) + "°";
  targetMarker.style.transform = "translateX(-50%) rotate(" + targetAngle + "deg)";
  targetMarker.classList.add("show");
}

function updateDirectionDisplay(text){
  directionReadout.innerText = text;
  moveBadge.innerText = text;

  if(text === "Stopped"){
    moveBadge.className = "badge";
  }else{
    moveBadge.className = "badge moving";
  }
}

function buildDial(){
  for(let i = 0; i < 360; i += 10){
    const tick = document.createElement("div");
    tick.className = (i % 90 === 0) ? "tick major" : "tick";
    tick.style.transform = "translateX(-50%) rotate(" + i + "deg)";
    dial.appendChild(tick);
  }


}

async function connectSerial(){
  port = await navigator.serial.requestPort();
  await port.open({baudRate:9600});

  writer = port.writable.getWriter();
  reader = port.readable.getReader();

  connectBadge.innerText = "Connected";
  connectBadge.className = "badge connected";

  readSerialLoop();
}

async function readSerialLoop(){
  const decoder = new TextDecoder();

  while(true){
    const {value, done} = await reader.read();
    if(done) break;

    serialBuffer += decoder.decode(value);

    let lines = serialBuffer.split("\n");
    serialBuffer = lines.pop();

    for(let line of lines){
      line = line.trim();
      processLine(line);
    }
  }
}

function processLine(line){
  const val = parseFloat(line);

  if(!isNaN(val) && val >= 0 && val <= 360){
    updateAngleDisplay(val);
  }
}

async function sendCommand(cmd){
  if(!writer) return;
  await writer.write(new TextEncoder().encode(cmd + "\n"));
}

function getFrequency(){
  const f = parseFloat(freqInput.value);
  if(isNaN(f) || f <= 0) return null;
  return f;
}

function runClockwise(){
  updateTargetDisplay();

  const f = getFrequency();
  if(f === null) return;

  movingDirection = "clockwise";
  updateDirectionDisplay("Clockwise");

  sendCommand(f + "f");
}

function runAnticlockwise(){
  updateTargetDisplay();

  const f = getFrequency();
  if(f === null) return;

  movingDirection = "anticlockwise";
  updateDirectionDisplay("Anticlockwise");

  sendCommand(f + "r");
}

function stopMotor(){
  movingDirection = null;
  updateDirectionDisplay("Stopped");
  sendCommand("s");
}

function clockwiseDistance(from, to){
  return (to - from + 360) % 360;
}

function anticlockwiseDistance(from, to){
  return (from - to + 360) % 360;
}

function checkTarget(){
  if(targetAngle === null || movingDirection === null) return;

  const tolerance = 1.0;

  if(movingDirection === "clockwise"){
    const remaining = clockwiseDistance(currentAngle, targetAngle);
    if(remaining <= tolerance || remaining >= 359){
      stopMotor();
    }
  }

  if(movingDirection === "anticlockwise"){
    const remaining = anticlockwiseDistance(currentAngle, targetAngle);
    if(remaining <= tolerance || remaining >= 359){
      stopMotor();
    }
  }
}

function pointerAngleFromEvent(event){
  const rect = dial.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  const x = event.clientX - cx;
  const y = event.clientY - cy;

  let deg = Math.atan2(y, x) * 180 / Math.PI + 90;
  return normaliseAngle(deg);
}

let dragging = false;

dial.addEventListener("pointerdown", (event) => {
  dragging = true;
  dial.setPointerCapture(event.pointerId);
  const angle = pointerAngleFromEvent(event);
  targetInput.value = angle.toFixed(2);
  updateTargetDisplay();
});

dial.addEventListener("pointermove", (event) => {
  if(!dragging) return;
  const angle = pointerAngleFromEvent(event);
  targetInput.value = angle.toFixed(2);
  updateTargetDisplay();
});

dial.addEventListener("pointerup", () => {
  dragging = false;
});

dial.addEventListener("pointercancel", () => {
  dragging = false;
});

targetInput.addEventListener("input", updateTargetDisplay);

buildDial();
updateTargetDisplay();
updateAngleDisplay(0);
updateDirectionDisplay("Stopped");
</script>

</body>
</html>
