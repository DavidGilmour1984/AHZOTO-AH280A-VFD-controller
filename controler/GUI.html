<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rotary Stage Controller</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Helvetica,Arial,sans-serif;
background:#f5f7fb;
margin:0;
padding:40px;
display:flex;
justify-content:center;
align-items:flex-start;
min-height:100vh;
color:#0f172a;
}

.card{
background:white;
width:1100px;
max-width:95%;
padding:40px;
border-radius:18px;
box-shadow:0 20px 50px rgba(0,0,0,0.15);

display:grid;
grid-template-columns:520px 1fr;
column-gap:40px;
row-gap:20px;
}

h1{
grid-column:1 / -1;
margin:0;
font-size:42px;
}

.sub{
grid-column:1 / -1;
color:#64748b;
font-size:18px;
}

/* ---------- DIAL ---------- */

.dialWrap{
grid-column:1;
display:flex;
justify-content:center;
align-items:center;
}

.dial{
width:420px;
height:420px;
border-radius:50%;
position:relative;

background:
radial-gradient(circle,#ffffff 0 65%,#e2e8f0 66%);

border:10px solid #cbd5e1;
}

.tick{
position:absolute;
left:50%;
top:12px;
width:2px;
height:20px;
background:#94a3b8;
transform-origin:50% 200px;
}

.tick.major{
height:30px;
width:3px;
background:#0f172a;
}

.pointer{
position:absolute;
left:50%;
top:70px;
width:6px;
height:150px;
background:#2563eb;
transform-origin:50% 140px;
border-radius:4px;
}

.pointerArrow{
position:absolute;
top:-18px;
left:50%;
transform:translateX(-50%);
width:0;
height:0;
border-left:12px solid transparent;
border-right:12px solid transparent;
border-bottom:18px solid #2563eb;
}

.centerDot{
position:absolute;
left:50%;
top:50%;
width:18px;
height:18px;
background:#0f172a;
border-radius:50%;
transform:translate(-50%,-50%);
}

.targetMarker{
position:absolute;
left:50%;
top:12px;
width:4px;
height:30px;
background:#ef4444;
transform-origin:50% 200px;
opacity:0;
}

.targetMarker.show{
opacity:1;
}

/* ---------- DATA PANEL ---------- */

.panel{
grid-column:2;
display:flex;
flex-direction:column;
gap:20px;
}

table{
width:100%;
border-collapse:collapse;
font-size:20px;
}

td{
padding:12px 10px;
border-bottom:1px solid #e2e8f0;
}

td:first-child{
color:#64748b;
}

.value{
font-weight:700;
text-align:right;
}

input{
width:120px;
font-size:22px;
padding:6px;
border-radius:8px;
border:1px solid #cbd5e1;
text-align:right;
}

/* ---------- BUTTONS ---------- */

.buttonRow{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:10px;
}

button{
font-size:20px;
padding:14px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:700;
color:white;
}

.connect{background:#22c55e;}
.cw{background:#2563eb;}
.ccw{background:#7c3aed;}
.stop{background:#ef4444;}

.full{
grid-column:1 / -1;
}

</style>
</head>

<body>

<div class="card">

<h1>Rotary Stage Controller</h1>

<div class="sub">
Encoder angle monitoring and direct VFD serial control
</div>

<div class="dialWrap">

<div id="dial" class="dial">

<div id="targetMarker" class="targetMarker"></div>

<div id="pointer" class="pointer">
<div class="pointerArrow"></div>
</div>

<div class="centerDot"></div>

</div>

</div>

<div class="panel">

<table>

<tr>
<td>Current Angle</td>
<td class="value" id="angleDisplay">0.00°</td>
</tr>

<tr>
<td>Target Angle</td>
<td class="value" id="targetReadout">--</td>
</tr>

<tr>
<td>Direction</td>
<td class="value" id="directionReadout">Stopped</td>
</tr>

<tr>
<td>Frequency (Hz)</td>
<td class="value">
<input id="freq" type="number" step="0.1" value="10">
</td>
</tr>

<tr>
<td>Set Target</td>
<td class="value">
<input id="target" type="number" step="0.01" min="0" max="360" value="90">
</td>
</tr>

</table>

<div class="buttonRow">

<button class="connect full" onclick="connectSerial()">
Connect Controller
</button>

<button class="cw" onclick="runClockwise()">
Clockwise
</button>

<button class="ccw" onclick="runAnticlockwise()">
Anticlockwise
</button>

<button class="stop full" onclick="stopMotor()">
Stop
</button>

</div>

</div>

</div>

<script>

let port;
let reader;
let writer;
let serialBuffer = "";

let currentAngle = 0;
let targetAngle = null;
let movingDirection = null;

const angleDisplay = document.getElementById("angleDisplay");
const pointer = document.getElementById("pointer");
const targetMarker = document.getElementById("targetMarker");
const targetReadout = document.getElementById("targetReadout");
const directionReadout = document.getElementById("directionReadout");
const dial = document.getElementById("dial");
const targetInput = document.getElementById("target");
const freqInput = document.getElementById("freq");

function normaliseAngle(angle){
let a = angle % 360;
if(a < 0) a += 360;
return a;
}

function updateAngleDisplay(angle){

currentAngle = normaliseAngle(angle);

angleDisplay.innerText = currentAngle.toFixed(2) + "°";

pointer.style.transform =
"translateX(-50%) rotate(" + currentAngle + "deg)";

checkTarget();

}

function updateTargetDisplay(){

const raw = parseFloat(targetInput.value);

if(isNaN(raw)){
targetAngle = null;
targetReadout.innerText="--";
targetMarker.classList.remove("show");
return;
}

targetAngle = normaliseAngle(raw);

targetReadout.innerText = targetAngle.toFixed(2)+"°";

targetMarker.style.transform =
"translateX(-50%) rotate("+targetAngle+"deg)";

targetMarker.classList.add("show");

}

function updateDirectionDisplay(text){

directionReadout.innerText = text;

}

function buildDial(){

for(let i=0;i<360;i+=10){

const tick=document.createElement("div");

tick.className = (i%90===0) ? "tick major" : "tick";

tick.style.transform =
"translateX(-50%) rotate("+i+"deg)";

dial.appendChild(tick);

}

}

async function connectSerial(){

port = await navigator.serial.requestPort();

await port.open({baudRate:9600});

writer = port.writable.getWriter();
reader = port.readable.getReader();

readSerialLoop();

}

async function readSerialLoop(){

const decoder=new TextDecoder();

while(true){

const {value,done}=await reader.read();
if(done) break;

serialBuffer += decoder.decode(value);

let lines = serialBuffer.split("\n");

serialBuffer = lines.pop();

for(let line of lines){

line=line.trim();

processLine(line);

}

}

}

function processLine(line){

const val=parseFloat(line);

if(!isNaN(val) && val>=0 && val<=360){

updateAngleDisplay(val);

}

}

async function sendCommand(cmd){

if(!writer) return;

await writer.write(new TextEncoder().encode(cmd+"\n"));

}

function getFrequency(){

const f=parseFloat(freqInput.value);

if(isNaN(f) || f<=0) return null;

return f;

}

function runClockwise(){

updateTargetDisplay();

const f=getFrequency();

if(f===null) return;

movingDirection="clockwise";

updateDirectionDisplay("Clockwise");

sendCommand(f+"f");

}

function runAnticlockwise(){

updateTargetDisplay();

const f=getFrequency();

if(f===null) return;

movingDirection="anticlockwise";

updateDirectionDisplay("Anticlockwise");

sendCommand(f+"r");

}

function stopMotor(){

movingDirection=null;

updateDirectionDisplay("Stopped");

sendCommand("s");

}

function clockwiseDistance(from,to){

return (to-from+360)%360;

}

function anticlockwiseDistance(from,to){

return (from-to+360)%360;

}

function checkTarget(){

if(targetAngle===null || movingDirection===null) return;

const tolerance=1.0;

if(movingDirection==="clockwise"){

const remaining=clockwiseDistance(currentAngle,targetAngle);

if(remaining<=tolerance || remaining>=359){

stopMotor();

}

}

if(movingDirection==="anticlockwise"){

const remaining=anticlockwiseDistance(currentAngle,targetAngle);

if(remaining<=tolerance || remaining>=359){

stopMotor();

}

}

}

function pointerAngleFromEvent(event){

const rect=dial.getBoundingClientRect();

const cx=rect.left+rect.width/2;
const cy=rect.top+rect.height/2;

const x=event.clientX-cx;
const y=event.clientY-cy;

let deg=Math.atan2(y,x)*180/Math.PI+90;

return normaliseAngle(deg);

}

let dragging=false;

dial.addEventListener("pointerdown",(event)=>{

dragging=true;

dial.setPointerCapture(event.pointerId);

const angle=pointerAngleFromEvent(event);

targetInput.value=angle.toFixed(2);

updateTargetDisplay();

});

dial.addEventListener("pointermove",(event)=>{

if(!dragging) return;

const angle=pointerAngleFromEvent(event);

targetInput.value=angle.toFixed(2);

updateTargetDisplay();

});

dial.addEventListener("pointerup",()=>dragging=false);
dial.addEventListener("pointercancel",()=>dragging=false);

targetInput.addEventListener("input",updateTargetDisplay);

buildDial();
updateTargetDisplay();
updateAngleDisplay(0);
updateDirectionDisplay("Stopped");

</script>

</body>
</html>
